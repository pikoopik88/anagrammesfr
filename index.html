<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anagrammes Master - Mode Mystﺣ۷re</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --danger: #f43f5e; --success: #10b981; --text: #f8fafc; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 140px; 
        }

        .game-header { 
            background: var(--card); width: 100%; padding: 10px 0; text-align: center; 
            position: sticky; top: 0; z-index: 10; box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }
        .timer-container { width: 100%; height: 6px; background: #334155; margin-top: 10px; overflow: hidden; }
        #timer-bar { height: 100%; width: 100%; background: var(--primary); transition: width 1s linear; }

        .container { width: 95%; max-width: 900px; padding: 20px; text-align: center; }
        
        /* Connexion */
        .connection-box { background: var(--card); padding: 2rem; border-radius: 1.5rem; border: 2px dashed var(--primary); margin-top: 20px; }
        .copy-group { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .copy-group input { background: #0f172a; border: 1px solid #475569; color: var(--primary); padding: 10px; border-radius: 6px; width: 60%; }

        /* Zone de Tirage */
        .letters-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
        .letters { 
            font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900; color: var(--primary); 
            letter-spacing: 0.5rem; text-transform: uppercase; text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }
        .btn-shuffle { 
            background: #334155; color: white; border: none; padding: 10px; border-radius: 50%; 
            cursor: pointer; width: 45px; height: 45px; font-size: 1.2rem; transition: transform 0.2s;
        }
        .btn-shuffle:hover { transform: rotate(90deg); background: #475569; }

        #user-input { 
            background: #1e293b; border: 2px solid #475569; color: white; padding: 12px; 
            font-size: 1.5rem; border-radius: 0.8rem; width: 85%; max-width: 400px; text-align: center; outline: none;
        }
        #user-input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }

        /* Grilles */
        .length-section { margin-top: 30px; text-align: left; }
        .length-title { font-size: 0.8rem; font-weight: bold; color: #64748b; border-bottom: 1px solid #334155; padding-bottom: 5px; margin-bottom: 12px; }
        .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        .word-slot { 
            background: #0f172a; padding: 8px; border-radius: 5px; border: 1px solid #334155;
            font-family: 'Courier New', monospace; font-size: 1rem; text-align: center;
            white-space: nowrap; color: transparent; 
        }
        .revealed { background: #0c4a6e; color: var(--primary) !important; border-color: var(--primary); font-weight: bold; }
        .missed { background: #451a03; color: var(--missed) !important; border-color: #fbbf24; font-style: italic; }

        /* Footer */
        #game-over-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; 
            border-top: 4px solid var(--primary); padding: 15px; display: none; 
            justify-content: space-around; align-items: center; z-index: 100;
        }
        button.action { padding: 12px 20px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; }
        .btn-success { background: var(--success); color: white; }
    </style>
</head>
<body>

<div class="game-header">
    <div id="timer-text" style="font-family: monospace; font-size: 1.8rem;">03:00</div>
    <div class="timer-container"><div id="timer-bar"></div></div>
</div>

<div class="container">
    <div id="setup-ui" class="connection-box">
        <h2 id="status-msg">Chargement...</h2>
        <div id="share-area" style="display:none">
            <div class="copy-group">
                <input type="text" id="game-link-input" readonly>
                <button class="btn-success" style="padding:10px" onclick="copyGameLink()">ﻭ Copier</button>
            </div>
            <button class="action btn-success" id="start-btn" style="display:none" onclick="setupNewRound()">ﻭ LANCER LA PARTIE</button>
        </div>
    </div>

    <div id="game-ui" style="display:none">
        <div class="letters-row">
            <div class="letters" id="scrambled-display">-------</div>
            <button class="btn-shuffle" onclick="shuffleVisual()" title="Mﺣ۸langer les lettres">ﻭ</button>
        </div>
        <div id="mystery-badge" style="margin-bottom: 10px; font-weight: bold;"></div>
        
        <input type="text" id="user-input" placeholder="Mot + Entrﺣ۸e" autocomplete="off">
        <div id="score-info" style="color: #64748b; margin-top: 15px;">Mots : 0 / 0</div>
        <div id="main-container"></div>
    </div>
</div>

<div id="game-over-panel">
    <div>
        <div id="result-title" style="font-weight: bold; color: var(--primary);">FIN</div>
        <div id="final-res">0 / 0</div>
    </div>
    <button id="restart-btn" class="action btn-success" style="display:none" onclick="setupNewRound()">ﻭ NOUVELLE PARTIE</button>
</div>

<script>
    let peer, conn, connections = [], isHost = false;
    let fullDictionary = [];
    let currentRound = { baseWord: "", solutions: [], found: [], timeLeft: 180, active: false, mystery: null };
    let timerInterval;

    const normalize = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();

async function loadDict() {
    const status = document.getElementById('status-msg');
    status.innerText = "Chargement de ton lexique perso...";

    // REMPLACE ICI PAR TON LIEN RAW GITHUB (clique sur 'Raw' sur GitHub pour l'avoir)
    const url = 'https://raw.githubusercontent.com/pikoopik88/anagrammesfr/refs/heads/main/lexique.txt';

    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Fichier introuvable sur GitHub');

        const text = await response.text();
        
        // On sﺣ۸pare par ligne, puis on nettoie chaque ligne des tabulations/espaces
        const lines = text.split(/\r?\n/);

        fullDictionary = lines
            .map(line => line.split('\t')[0].trim()) // On prend le premier ﺣ۸lﺣ۸ment avant la tabulation
            .filter(word => {
                // Filtre de sﺣ۸curitﺣ۸ pour ton jeu
                if (word.length < 4 || word.length > 8) return false;
                
                // On garde uniquement les lettres (sans chiffres ni symboles)
                // Note : On autorise les accents ici, ils seront normalisﺣ۸s aprﺣ۷s
                if (!/^[a-zA-Zﺣ ﺣ۱ﺣ۶ﺣ۸ﺣ۷ﺣ۹ﺣ،ﺣ؟ﺣﺁﺣﺑﺣﭨﺣﺗﺣﺟﺣﺎﺣ۵ﺧ-]+$/i.test(word)) return false;

                // Optionnel : On peut filtrer les majuscules si tu ne veux pas de noms propres
                // if (word[0] === word[0].toUpperCase()) return false;

                return true;
            })
            .map(word => normalize(word)); // Enlﺣ۷ve accents + MAJUSCULES

        // Supprimer les doublons ﺣ۸ventuels
        fullDictionary = Array.from(new Set(fullDictionary));

        if (fullDictionary.length === 0) throw new Error('Liste vide aprﺣ۷s filtrage');

        status.innerHTML = `<span style="color:var(--success)">ﻗ Lexique Perso Prﺣ۹t (${fullDictionary.length} mots)</span>`;
        
        if(isHost) {
            document.getElementById('start-btn').style.display = "inline-block";
        }

    } catch (e) {
        console.error("Erreur lecture lexique.txt :", e);
        status.innerHTML = `<span style="color:var(--danger)">ﻗ ﺅﺕ Erreur : Vﺣ۸rifie le lien de ton fichier .txt</span>`;
        
        // Secours au cas oﺣﺗ (pour que le jeu ne soit pas bloquﺣ۸)
        const backup = ["MAISON", "BATEAU", "MANGER", "SOLEIL", "PLAGE", "ARBRE", "JOURNAL"];
        fullDictionary = backup.map(w => normalize(w));
    }
}

    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('join');

    async function init() {
        await loadDict();
        peer = new Peer({
    config: {
        'iceServers': [
            { url: 'stun:stun.l.google.com:19302' },
            { url: 'stun:stun1.l.google.com:19302' },
            { url: 'stun:stun2.l.google.com:19302' },
        ]
    }
});
    peer.on('open', (id) => {
    if (joinId) {
        document.getElementById('status-msg').innerHTML = "Connexion au Host...<br><small>Recherche d'un passage rﺣ۸seau...</small>";
        // On ajoute "reliable: true" pour stabiliser l'envoi des mots
        conn = peer.connect(joinId, { reliable: true });
        setupClientEvents(conn);
    } else {
        isHost = true;
        const link = window.location.href.split('?')[0] + "?join=" + id;
        document.getElementById('game-link-input').value = link;
        document.getElementById('share-area').style.display = "block";
        document.getElementById('start-btn').style.display = "inline-block";
        document.getElementById('status-msg').innerText = "Prﺣ۹t ﺣ  hﺣ۸berger !";
    }
    });

    if (isHost) {
        peer.on('connection', (c) => {
            connections.push(c);
    
            // --- C'EST ICI QUE ﺣA SE JOUE ---
            // On attend que le canal de donnﺣ۸es soit "OPEN" avant d'envoyer quoi que ce soit
            c.on('open', () => {
                console.log("Un joueur a rejoint le salon :", c.peer);
                
                // Si une partie est dﺣ۸jﺣ  lancﺣ۸e ou en cours
                if (currentRound.active) {
                    console.log("Envoi de la partie en cours au nouveau joueur...");
                    c.send({ 
                        type: 'SYNC', 
                        round: currentRound 
                    });
                } else {
                    // Si la partie n'est pas lancﺣ۸e, on peut envoyer un petit signal
                    // pour dire "Je suis lﺣ , j'attends que le Host clique sur Start"
                    c.send({ type: 'WAITING_FOR_START' });
                }
            });
    
            c.on('data', (data) => { 
                if(data.type === 'GUESS') handleGuess(data.word); 
            });
            
            c.on('close', () => {
                connections = connections.filter(conn => conn !== c);
            });
        });
    }
    }

    function setupClientEvents(c) {
        c.on('data', (d) => handleData(d));
        c.on('open', () => document.getElementById('status-msg').innerText = "Connectﺣ۸ ! Attente du dﺣ۸but...");
    }

    function handleData(data) {
        if (data.type === 'WAITING_FOR_START') {
            document.getElementById('status-msg').innerHTML = "ﻗ Connectﺣ۸ au Host !<br>Le Host va bientﺣﺑt lancer la partie...";
}
        if (data.type === 'START' || data.type === 'SYNC') {
            currentRound = data.round;
            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('game-over-panel').style.display = 'none';
            document.getElementById('user-input').disabled = false;
            document.getElementById('user-input').value = "";
            renderGrid();
            updateDisplayLetters();
            startVisualTimer();
        }
        if (data.type === 'UPDATE') {
            const el = document.getElementById('word-' + data.word);
            if(el) { el.innerText = data.word; el.className = 'word-slot revealed'; }
            currentRound.found.push(data.word);
            updateScoreText();
            updateDisplayLetters(); // Pour vﺣ۸rifier si on rﺣ۸vﺣ۷le le ?
        }
        if (data.type === 'END') {
            currentRound.active = false;
            clearInterval(timerInterval);
            document.getElementById('user-input').disabled = true;
            data.allSolutions.forEach(w => {
                const el = document.getElementById('word-' + w);
                if(el && !currentRound.found.includes(w)) { el.innerText = w; el.className = 'word-slot missed'; }
            });
            document.getElementById('result-title').innerText = data.title;
            document.getElementById('final-res').innerText = `Score : ${currentRound.found.length} / ${data.allSolutions.length}`;
            document.getElementById('game-over-panel').style.display = 'flex';
            if(isHost) document.getElementById('restart-btn').style.display = 'block';
        }
    }

    function setupNewRound() {
        if (!isHost) return;
        const targetLength = [6, 7, 8][Math.floor(Math.random() * 3)];
        const pool = fullDictionary.filter(w => w.length === targetLength);
        const base = pool[Math.floor(Math.random() * pool.length)];
        
        const f = {}; for(let l of base) f[l] = (f[l]||0)+1;
        const possible = Array.from(new Set(fullDictionary.filter(w => w.length>=4 && canForm(w, f))))
                        .sort((a,b) => a.length - b.length || a.localeCompare(b));

        let mystery = { active: false };
        if (possible.length <= (base.length * 2)) {
            const idx = Math.floor(Math.random() * base.length);
            mystery = { active: true, letter: base[idx], index: idx };
        }

        currentRound = { baseWord: base, solutions: possible, found: [], timeLeft: 180, active: true, mystery: mystery };
        broadcast({ type: 'START', round: currentRound });
        startHostTimer();
    }

    function handleGuess(word) {
        if (!currentRound.active) return;
        const val = normalize(word);
        if (currentRound.solutions.includes(val) && !currentRound.found.includes(val)) {
            broadcast({ type: 'UPDATE', word: val });
            if (currentRound.found.length === currentRound.solutions.length) {
                broadcast({ type: 'END', title: "VICTOIRE !", allSolutions: currentRound.solutions });
            }
        }
    }

    function updateDisplayLetters() {
        const mystery = currentRound.mystery;
        let letters = currentRound.baseWord.split('');
        const badge = document.getElementById('mystery-badge');
        
        if (mystery && mystery.active) {
            const isSolved = currentRound.found.some(w => w.includes(mystery.letter));
            if (!isSolved) {
                letters[mystery.index] = "?";
                badge.innerHTML = `<span style="color:var(--danger)">ﻗ ﺅﺕ MODE MYSTﺣRE : Trouvez une lettre !</span>`;
            } else {
                badge.innerHTML = `<span style="color:var(--success)">ﻗ MYSTﺣRE RﺣSOLU : C'ﺣ۸tait le ${mystery.letter}</span>`;
            }
        } else {
            badge.innerHTML = "";
        }
        currentDisplay = letters; 
        shuffleVisual();
    }

    let currentDisplay = [];
    function shuffleVisual() {
        const shuffled = [...currentDisplay].sort(() => Math.random() - 0.5).join(' ');
        document.getElementById('scrambled-display').innerText = shuffled;
    }

    function renderGrid() {
        const container = document.getElementById('main-container');
        container.innerHTML = '';
        const groups = {};
        currentRound.solutions.forEach(w => { if(!groups[w.length]) groups[w.length]=[]; groups[w.length].push(w); });
        Object.keys(groups).forEach(len => {
            let html = `<div class="length-section"><div class="length-title">${len} LETTRES</div><div class="word-grid">`;
            groups[len].forEach(w => html += `<div class="word-slot" id="word-${w}">${"_ ".repeat(w.length).trim()}</div>`);
            container.innerHTML += html + `</div></div>`;
        });
        updateScoreText();
    }

    function startHostTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            currentRound.timeLeft--;
            if (currentRound.timeLeft <= 0) broadcast({ type: 'END', title: "TEMPS ﺣCOULﺣ !", allSolutions: currentRound.solutions });
        }, 1000);
    }

    function startVisualTimer() {
        const bar = document.getElementById('timer-bar');
        const txt = document.getElementById('timer-text');
        const intv = setInterval(() => {
            if(!currentRound.active) { clearInterval(intv); return; }
            const mins = Math.floor(currentRound.timeLeft / 60);
            const secs = currentRound.timeLeft % 60;
            txt.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            bar.style.width = (currentRound.timeLeft / 180 * 100) + "%";
        }, 1000);
    }

    function broadcast(d) { connections.forEach(c => {if(c.open) c.send(d);}); handleData(d); }
    function canForm(w, f) {
        const wf = {}; for(let l of w) wf[l] = (wf[l]||0)+1;
        for(let l in wf) if(!f[l] || wf[l]>f[l]) return false;
        return true;
    }
    function updateScoreText() { document.getElementById('score-info').innerText = `Mots : ${currentRound.found.length} / ${currentRound.solutions.length}`; }
    function copyGameLink() { navigator.clipboard.writeText(document.getElementById('game-link-input').value); }

    document.getElementById('user-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = e.target.value.trim();
            if(isHost) handleGuess(val); else if(conn) conn.send({ type: 'GUESS', word: val });
            e.target.value = "";
        }
    });

    init();
</script>
</body>
</html>
