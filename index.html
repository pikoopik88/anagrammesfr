<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anagrammes Master Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --danger: #f43f5e; --success: #10b981; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; display: flex; flex-direction: column; align-items: center; }
        
        /* Header & Timer */
        .game-header { background: var(--card); width: 100%; padding: 10px 0; text-align: center; position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .timer-container { width: 100%; height: 6px; background: #334155; margin-top: 10px; }
        #timer-bar { height: 100%; width: 100%; background: var(--primary); transition: width 0.5s linear; }

        /* Layout Global */
        .container { width: 95%; max-width: 1200px; padding: 20px; }
        
        /* Connexion UI */
        .connection-box { background: var(--card); padding: 2rem; border-radius: 1.5rem; border: 2px dashed var(--primary); text-align: center; max-width: 500px; margin: 0 auto; }
        input[type="text"] { background: #0f172a; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; font-size: 1rem; outline: none; margin-bottom: 15px; width: 80%; text-align: center;}
        input[type="text"]:focus { border-color: var(--primary); }

        /* Jeu Layout */
        .game-layout { display: flex; gap: 40px; flex-wrap: nowrap; width: 100%; justify-content: space-between; align-items: flex-start; }
        .main-game { flex: 1; text-align: center; }
        
        /* Side Panel (Droite) */
        .side-panel { width: 300px; min-width: 280px; background: var(--card); border-radius: 15px; padding: 20px; height: fit-content; border-left: 4px solid var(--primary); box-shadow: -5px 0 15px rgba(0,0,0,0.2); }

        /* Lettres et Grille */
        .letters-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0; }
        .letters { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; color: var(--primary); letter-spacing: 0.4rem; text-transform: uppercase; }
        
        .length-section { margin-top: 20px; text-align: left; }
        .length-title { font-size: 0.8rem; color: #64748b; border-bottom: 1px solid #334155; margin-bottom: 10px; padding-bottom: 5px;}
        .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
        .word-slot { background: #0f172a; padding: 6px; border-radius: 4px; border: 1px solid #334155; text-align: center; font-family: monospace; color: transparent; }
        .revealed { background: #0c4a6e; color: var(--primary) !important; border-color: var(--primary); }
        .missed { background: #451a03; color: #fbbf24 !important; }

        /* Sidebar Elements */
        #score-board div { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; }
        #feed { height: 250px; overflow-y: auto; font-size: 0.85rem; color: #94a3b8; display: flex; flex-direction: column-reverse; margin-top: 10px; }
        .feed-item { margin-bottom: 6px; border-left: 2px solid var(--success); padding-left: 8px; background: rgba(15, 23, 42, 0.5); padding-top: 4px; padding-bottom: 4px; }

        /* Boutons */
        button { background: var(--primary); color: #0f172a; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s;}
        button:hover { filter: brightness(1.1); }
        button.btn-success { background: var(--success); color: white; }
        button.btn-danger { background: var(--danger); color: white; }
        .btn-shuffle { background: #334155; color: white; border-radius: 50%; width: 45px; height: 45px; padding: 0; display: flex; align-items: center; justify-content: center; }

        /* End Screen Overlay */
        #end-overlay { display: none; margin-bottom: 25px; padding: 25px; background: rgba(244, 63, 94, 0.15); border: 2px solid var(--danger); border-radius: 15px; }

        /* Lobby Display */
        #lobby-display { margin-top: 20px; font-size: 1.1rem; color: var(--success); font-weight: bold; min-height: 30px; }

        @media (max-width: 850px) {
            .game-layout { flex-direction: column; align-items: center; }
            .side-panel { width: 100%; border-left: none; border-top: 4px solid var(--primary); margin-top: 20px; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<div class="game-header">
    <div id="timer-text" style="font-family: monospace; font-size: 1.8rem;">00:30</div>
    <div class="timer-container"><div id="timer-bar"></div></div>
</div>

<div class="container">
    <div id="setup-ui" class="connection-box">
        <h2 id="status-msg">Chargement du dictionnaire...</h2>
        
        <div id="pseudo-area">
            <input type="text" id="player-pseudo" placeholder="Choisis ton pseudo..." maxlength="15">
            <br>
            <button id="host-btn" style="display:none" onclick="hostGame()">Créer une partie</button>
            <button id="join-btn" class="btn-success" style="display:none" onclick="joinGame()">Rejoindre la partie</button>
        </div>

        <div id="lobby-display"></div>

        <div id="share-area" style="display:none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #334155;">
            <p style="color: var(--success); font-weight: bold;">✅ Salon ouvert !</p>
            <p style="font-size: 0.9rem;">Envoie ce lien à tes joueurs :</p>
            <input type="text" id="game-link-input" readonly style="width: 100%; font-size: 0.8rem;">
            <button onclick="copyLink()" style="margin-bottom: 15px;">📋 Copier le lien</button>
            <br>
            <button id="start-btn" class="btn-success" style="display:none; width: 100%; font-size: 1.2rem;" onclick="setupNewRound()">🚀 LANCER LA PARTIE</button>
        </div>
    </div>

    <div id="game-layout" class="game-layout" style="display:none">
        
        <div class="main-game">
            
            <div id="end-overlay">
                <h2 style="color: var(--danger); margin-top: 0; font-size: 2rem;">TEMPS ÉCOULÉ !</h2>
                <button id="replay-btn" class="btn-success" style="display:none; font-size: 1.3rem; padding: 15px 30px;" onclick="setupNewRound()">🔄 REJOUER UNE MANCHE</button>
                <p id="wait-host-msg" style="display:none; color: #94a3b8; font-size: 1.1rem;">En attente de l'hôte pour rejouer...</p>
            </div>

            <div class="letters-row">
                <div class="letters" id="scrambled-display">-------</div>
                <button class="btn-shuffle" onclick="shuffleVisual()">🔄</button>
            </div>
            
            <div id="mystery-badge" style="color: var(--danger); font-weight: bold; margin-bottom: 15px;"></div>
            
            <input type="text" id="user-input" placeholder="Tape un mot et valide (Entrée)..." autocomplete="off" style="width: 100%; max-width: 400px; font-size: 1.5rem; text-transform: uppercase;">
            
            <div id="main-container"></div>
        </div>

        <div class="side-panel">
            <h3 style="margin:0 0 10px 0; color:var(--primary); font-size:1.1rem; border-bottom: 1px solid #334155; padding-bottom: 5px;">🏆 CLASSEMENT</h3>
            <div id="score-board"></div>
            
            <h3 style="margin:20px 0 10px 0; color:#64748b; font-size:0.9rem; border-bottom: 1px solid #334155; padding-bottom: 5px;">⚡ FLUX D'ACTIVITÉ</h3>
            <div id="feed"></div>
        </div>
    </div>
</div>

<div style="text-align:center; color:#475569; margin-top: 20px;"><small>v3.1</small></div>

<script>
    let peer, conn, connections = [], isHost = false;
    let fullDictionary = [];
    let myPseudo = "Anonyme";
    let players = {}; 
    let currentRound = { baseWord: "", scrambled: [], solutions: [], found: [], timeLeft: 30, active: false, mystery: null };
    let timerInterval;
    let autoShuffleInterval; // <-- NOUVEAU : Timer pour le mélange automatique

    const normalize = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
    const joinId = new URLSearchParams(window.location.search).get('join')?.trim();

    // --- CHARGEMENT DU DICTIONNAIRE ---
    async function loadDict() {
        try {
            // REMPLACE TON_PSEUDO ET TON_DEPOT PAR TES INFOS GITHUB
            const url = 'https://raw.githubusercontent.com/TON_PSEUDO/TON_DEPOT/main/lexique.txt';
            const resp = await fetch(url);
            if (!resp.ok) throw new Error("Fichier introuvable");
            const text = await resp.text();
            fullDictionary = Array.from(new Set(text.split(/\r?\n/).map(line => normalize(line.split('\t')[0].trim())).filter(w => w.length >= 4 && w.length <= 8)));
            
            if(fullDictionary.length < 100) throw new Error("Dico trop petit");
            setupUIReady();
        } catch (e) {
            console.error("Dico perso introuvable, secours activé.");
            fullDictionary = ["MAISON", "MANGER", "BATEAU", "AVION", "PLAGE", "SOLEIL", "POULET", "COURANT", "POMMIER", "VOITURE"].map(normalize);
            setupUIReady(true);
        }
    }

    function setupUIReady(isFallback = false) {
        document.getElementById('status-msg').innerHTML = isFallback ? "⚠️ Dico de secours chargé" : `✅ Dico prêt (${fullDictionary.length} mots)`;
        if (joinId) {
            document.getElementById('join-btn').style.display = "inline-block";
            document.getElementById('host-btn').style.display = "none";
        } else {
            document.getElementById('host-btn').style.display = "inline-block";
            document.getElementById('join-btn').style.display = "none";
        }
    }

    // --- FONCTIONS DE CONNEXION ---
    function hostGame() {
        myPseudo = document.getElementById('player-pseudo').value.trim() || "Host";
        document.getElementById('host-btn').disabled = true;
        document.getElementById('status-msg').innerText = "Création du salon en cours...";

        peer = new Peer({ config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] } });

        peer.on('open', (id) => {
            isHost = true;
            players[id] = { pseudo: myPseudo, scorePartie: 0, scoreSession: 0 }; 
            
            const link = window.location.href.split('?')[0] + "?join=" + id;
            document.getElementById('game-link-input').value = link;
            
            document.getElementById('host-btn').style.display = "none";
            document.getElementById('share-area').style.display = "block";
            document.getElementById('start-btn').style.display = "inline-block";
            document.getElementById('status-msg').innerText = "En attente des autres joueurs...";
            
            updateScoreBoard();
        });

        peer.on('connection', (c) => {
            connections.push(c);
            c.on('open', () => {
                if (currentRound.active) {
                    c.send({ type: 'SYNC', round: currentRound, serverTime: currentRound.timeLeft, players: players });
                }
            });
            c.on('data', (data) => {
                try {
                    if (data.type === 'JOIN') {
                        players[c.peer] = { pseudo: data.pseudo, scorePartie: 0, scoreSession: 0 };
                        broadcast({ type: 'SCORE_UPDATE', players: players });
                    }
                    if (data.type === 'GUESS') handleGuess(data.word, c.peer);
                } catch(e) { console.error(e); }
            });
            c.on('close', () => { connections = connections.filter(conn => conn !== c); });
        });

        peer.on('error', (err) => { document.getElementById('status-msg').innerText = "❌ Erreur Serveur: " + err.type; });
    }

    function joinGame() {
        myPseudo = document.getElementById('player-pseudo').value.trim() || "Joueur";
        document.getElementById('join-btn').disabled = true;
        document.getElementById('status-msg').innerText = "Connexion au réseau...";

        peer = new Peer({ config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] } });

        peer.on('open', () => {
            document.getElementById('status-msg').innerText = "Recherche de l'hôte...";
            conn = peer.connect(joinId);
            
            conn.on('open', () => {
                document.getElementById('status-msg').innerText = "✅ Connecté ! En attente du Host...";
                conn.send({ type: 'JOIN', pseudo: myPseudo }); 
            });
            
            conn.on('data', (data) => handleIncomingData(data));
            conn.on('close', () => alert("La connexion avec l'hôte a été perdue."));
        });

        peer.on('error', (err) => { document.getElementById('status-msg').innerText = "❌ Erreur: " + err.type; });
    }

    // --- LOGIQUE DE JEU ---
    function setupNewRound() {
        if (!isHost) return;
        
        const base = fullDictionary[Math.floor(Math.random() * fullDictionary.length)];
        const f = {}; for(let l of base) f[l] = (f[l]||0)+1;
        const possible = fullDictionary.filter(w => {
            const wf = {}; for(let l of w) wf[l] = (wf[l]||0)+1;
            for(let l in wf) if(!f[l] || wf[l]>f[l]) return false;
            return true;
        }).sort((a,b) => a.length - b.length);

        for(let id in players) players[id].scorePartie = 0;

        currentRound = { 
            baseWord: base,
            scrambled: base.split('').sort(() => Math.random() - 0.5), // <-- NOUVEAU: Sauvegarde de l'ordre visuel
            solutions: possible, 
            found: [], 
            timeLeft: 30,
            active: true,
            mystery: possible.length < 12 ? { active: true, letter: base[0], index: 0 } : null 
        };

        broadcast({ type: 'START', round: currentRound, players: players });
    }

    function handleGuess(word, senderId) {
        const val = normalize(word);
        if (currentRound.active && currentRound.solutions.includes(val) && !currentRound.found.includes(val)) {
            currentRound.found.push(val);
            const pts = val.length; 
            
            if (players[senderId]) {
                players[senderId].scorePartie += pts;
                players[senderId].scoreSession += pts;
            }
            
            currentRound.timeLeft = Math.min(180, currentRound.timeLeft + pts);
            
            broadcast({ 
                type: 'UPDATE', 
                word: val, 
                newTime: currentRound.timeLeft, 
                players: players, 
                finder: players[senderId]?.pseudo || "Inconnu",
                pts: pts
            });

            if (currentRound.found.length === currentRound.solutions.length) {
                currentRound.timeLeft = 0;
                broadcast({ type: 'END', allSolutions: currentRound.solutions });
            }
        }
    }

    function handleIncomingData(data) {
        try {
            if (data.type === 'START' || data.type === 'SYNC') {
                currentRound = data.round;
                players = data.players || players;
                if (data.serverTime) currentRound.timeLeft = data.serverTime;
                
                document.getElementById('setup-ui').style.display = 'none';
                document.getElementById('end-overlay').style.display = 'none';
                document.getElementById('game-layout').style.display = 'flex';
                document.getElementById('user-input').disabled = false;
                document.getElementById('user-input').focus();
                
                if(data.type === 'START') document.getElementById('feed').innerHTML = ''; 
                
                renderUI();
                startVisualTimer();
                
                // --- NOUVEAU: Shuffle automatique toutes les 20 secondes ---
                if (autoShuffleInterval) clearInterval(autoShuffleInterval);
                autoShuffleInterval = setInterval(() => {
                    if (currentRound.active) shuffleVisual();
                }, 20000);
            }
            
            if (data.type === 'UPDATE') {
                if(!currentRound.found.includes(data.word)) currentRound.found.push(data.word);
                currentRound.timeLeft = data.newTime;
                players = data.players;
                
                revealWord(data.word, 'revealed');
                addToFeed(data.finder, data.word, data.pts);
                updateScoreBoard();
            }
            
            if (data.type === 'SCORE_UPDATE') {
                players = data.players;
                updateScoreBoard();
            }
            
            if (data.type === 'END') {
                currentRound.active = false;
                document.getElementById('user-input').disabled = true;
                
                if (autoShuffleInterval) clearInterval(autoShuffleInterval); // Stop auto-shuffle

                const endPanel = document.getElementById('end-overlay');
                endPanel.style.display = 'block';
                
                if (data.allSolutions) {
                    data.allSolutions.forEach(w => {
                        const isFound = currentRound.found && currentRound.found.includes(w);
                        revealWord(w, isFound ? 'revealed' : 'missed');
                    });
                }
                
                if (isHost) {
                    document.getElementById('replay-btn').style.display = 'inline-block';
                    document.getElementById('wait-host-msg').style.display = 'none';
                } else {
                    document.getElementById('replay-btn').style.display = 'none';
                    document.getElementById('wait-host-msg').style.display = 'block';
                }
            }
        } catch (err) {
            console.error("Erreur d'affichage :", err);
        }
    }

    // --- INTERFACE (UI) ---
    function renderUI() {
        updateScoreBoard();
        const container = document.getElementById('main-container');
        container.innerHTML = "";
        
        const groups = {};
        currentRound.solutions.forEach(w => { (groups[w.length] = groups[w.length] || []).push(w); });
        
        Object.keys(groups).sort((a,b) => a - b).forEach(len => {
            let html = `<div class="length-section"><div class="length-title">${len} LETTRES</div><div class="word-grid">`;
            groups[len].forEach(w => {
                const isFound = currentRound.found && currentRound.found.includes(w);
                html += `<div class="word-slot ${isFound?'revealed':''}" id="word-${w}">${isFound ? w : "_ ".repeat(w.length)}</div>`;
            });
            container.innerHTML += html + `</div></div>`;
        });
        updateDisplayLetters();
    }

    function updateScoreBoard() {
        const board = document.getElementById('score-board');
        board.innerHTML = Object.values(players).sort((a,b) => b.scorePartie - a.scorePartie)
            .map(p => `<div>
                <span>${p.pseudo}</span>
                <span><b>${p.scorePartie} pts</b> <small style="color:#64748b">(${p.scoreSession})</small></span>
            </div>`).join('');
            
        if (!currentRound.active) {
            document.getElementById('lobby-display').innerHTML = `👥 <b>Dans le salon :</b> ${Object.values(players).map(p => p.pseudo).join(', ')}`;
        }
    }

    function addToFeed(pseudo, word, pts) {
        const f = document.getElementById('feed');
        f.innerHTML += `<div class="feed-item"><b>${pseudo}</b> a trouvé <b>${word}</b> <span style="color:var(--success)">(+${pts})</span></div>`;
    }

    function updateDisplayLetters() {
        if (!currentRound.scrambled) return;
        
        // NOUVEAU: On utilise la variable sauvegardée "scrambled" au lieu de générer du hasard ici
        let l = [...currentRound.scrambled]; 
        
        // Gestion de la lettre mystère
        if (currentRound.mystery && currentRound.found && !currentRound.found.some(w => w.includes(currentRound.mystery.letter))) {
            let idx = l.indexOf(currentRound.mystery.letter);
            if (idx !== -1) l[idx] = "?";
            document.getElementById('mystery-badge').innerText = "⚠️ LETTRE MYSTÈRE À TROUVER";
        } else {
            document.getElementById('mystery-badge').innerText = "";
        }
        
        document.getElementById('scrambled-display').innerText = l.join(' ');
    }

    function startVisualTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!currentRound.active) { clearInterval(timerInterval); return; }
            
            if (isHost) {
                currentRound.timeLeft--;
                if (currentRound.timeLeft <= 0) {
                    currentRound.timeLeft = 0;
                    broadcast({ type: 'END', allSolutions: currentRound.solutions });
                }
            } else {
                currentRound.timeLeft--; 
            }
            
            const t = Math.max(0, currentRound.timeLeft);
            document.getElementById('timer-text').innerText = `0${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
            document.getElementById('timer-bar').style.width = (t/180*100) + "%";
        }, 1000);
    }

    function revealWord(w, cls) {
        const el = document.getElementById('word-' + w);
        if (el) { el.innerText = w; el.className = 'word-slot ' + cls; }
        updateDisplayLetters(); // Va juste mettre à jour l'affichage avec l'ordre actuel
    }

    // --- UTILITAIRES ---
    function broadcast(d) { 
        connections = connections.filter(c => c.open); 
        connections.forEach(c => c.send(d)); 
        handleIncomingData(d); 
    }
    
    function shuffleVisual() { 
        if (!currentRound.active) return;
        // NOUVEAU: On mélange notre état sauvegardé, puis on demande l'affichage
        currentRound.scrambled.sort(() => Math.random() - 0.5);
        updateDisplayLetters();
    }
    
    function copyLink() { 
        navigator.clipboard.writeText(document.getElementById('game-link-input').value);
        alert("Lien copié ! Envoie-le à tes joueurs.");
    }

    document.getElementById('user-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = e.target.value.trim();
            if (val === "") return;
            
            if (isHost) {
                handleGuess(val, peer.id); 
            } else if (conn && conn.open) {
                conn.send({ type: 'GUESS', word: val });
            }
            e.target.value = "";
        }
    });

    loadDict();
</script>
</body>
</html>
