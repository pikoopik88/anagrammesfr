<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anagrammes Master Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --danger: #f43f5e; --success: #10b981; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; display: flex; flex-direction: column; align-items: center; }
        .game-header { background: var(--card); width: 100%; padding: 10px 0; text-align: center; position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .timer-container { width: 100%; height: 6px; background: #334155; margin-top: 10px; }
        #timer-bar { height: 100%; width: 100%; background: var(--primary); transition: width 0.5s linear; }
        .container { width: 95%; max-width: 1200px; padding: 20px; }
        .connection-box { background: var(--card); padding: 2rem; border-radius: 1.5rem; border: 2px dashed var(--primary); text-align: center; max-width: 500px; margin: 0 auto; }
        input[type="text"] { background: #0f172a; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; font-size: 1rem; outline: none; margin-bottom: 15px; width: 80%; text-align: center;}
        .game-layout { display: flex; gap: 40px; flex-wrap: nowrap; width: 100%; justify-content: space-between; align-items: flex-start; }
        .main-game { flex: 1; text-align: center; }
        .side-panel { width: 300px; min-width: 280px; background: var(--card); border-radius: 15px; padding: 20px; height: fit-content; border-left: 4px solid var(--primary); }
        .letters-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0; }
        .letters { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; color: var(--primary); letter-spacing: 0.4rem; text-transform: uppercase; min-height: 4rem; }
        .length-section { margin-top: 20px; text-align: left; }
        .length-title { font-size: 0.8rem; color: #64748b; border-bottom: 1px solid #334155; margin-bottom: 10px; padding-bottom: 5px;}
        .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
        .word-slot { background: #0f172a; padding: 6px; border-radius: 4px; border: 1px solid #334155; text-align: center; font-family: monospace; color: transparent; }
        .revealed { background: #0c4a6e; color: var(--primary) !important; border-color: var(--primary); }
        .missed { background: #451a03; color: #fbbf24 !important; }
        #score-board div { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; }
        #feed { height: 250px; overflow-y: auto; font-size: 0.85rem; color: #94a3b8; display: flex; flex-direction: column-reverse; margin-top: 10px; }
        .feed-item { margin-bottom: 6px; border-left: 2px solid var(--success); padding-left: 8px; background: rgba(15, 23, 42, 0.5); padding: 4px 8px; }
        button { background: var(--primary); color: #0f172a; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        button:hover { filter: brightness(1.1); }
        .btn-success { background: var(--success); color: white; }
        .btn-shuffle { background: #334155; color: white; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        #end-overlay { display: none; margin-bottom: 25px; padding: 25px; background: rgba(244, 63, 94, 0.15); border: 2px solid var(--danger); border-radius: 15px; }
        @media (max-width: 850px) { .game-layout { flex-direction: column; align-items: center; } .side-panel { width: 100%; border-left: none; border-top: 4px solid var(--primary); margin-top: 20px; } }
    </style>
</head>
<body>

<div class="game-header">
    <div id="timer-text" style="font-family: monospace; font-size: 1.8rem;">00:30</div>
    <div class="timer-container"><div id="timer-bar"></div></div>
</div>

<div class="container">
    <div id="setup-ui" class="connection-box">
        <h2 id="status-msg">Chargement...</h2>
        <div id="pseudo-area">
            <input type="text" id="player-pseudo" placeholder="Pseudo..." maxlength="15">
            <br>
            <button id="host-btn" style="display:none" onclick="hostGame()">Créer une partie</button>
            <button id="join-btn" class="btn-success" style="display:none" onclick="joinGame()">Rejoindre la partie</button>
        </div>
        <div id="lobby-display" style="margin-top:20px; color:var(--success); font-weight:bold;"></div>
        <div id="share-area" style="display:none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #334155;">
            <input type="text" id="game-link-input" readonly style="width: 100%; font-size: 0.8rem;">
            <button onclick="copyLink()">📋 Copier le lien</button>
            <br><br>
            <button id="start-btn" class="btn-success" style="width: 100%; font-size: 1.2rem;" onclick="setupNewRound()">🚀 LANCER LA PARTIE</button>
        </div>
    </div>

    <div id="game-layout" class="game-layout" style="display:none">
        <div class="main-game">
            <div id="end-overlay">
                <h2 style="color: var(--danger); margin-top: 0;">TEMPS ÉCOULÉ !</h2>
                <button id="replay-btn" class="btn-success" style="display:none;" onclick="setupNewRound()">🔄 REJOUER</button>
                <p id="wait-host-msg" style="display:none; color: #94a3b8;">L'hôte va relancer...</p>
            </div>
            <div class="letters-row">
                <div class="letters" id="scrambled-display"></div>
                <button class="btn-shuffle" onclick="requestShuffle()">🔄</button>
            </div>
            <div id="mystery-badge" style="color: var(--danger); font-weight: bold; margin-bottom: 15px;"></div>
            <input type="text" id="user-input" placeholder="Tape un mot..." autocomplete="off" style="width: 100%; max-width: 400px; font-size: 1.5rem; text-transform: uppercase;">
            <div id="main-container"></div>
        </div>
        <div class="side-panel">
            <h3 style="color:var(--primary); font-size:1rem;">🏆 CLASSEMENT</h3>
            <div id="score-board"></div>
            <h3 style="color:#64748b; font-size:0.9rem; margin-top:20px;">⚡ ACTIVITÉ</h3>
            <div id="feed"></div>
        </div>
    </div>
</div>

<div style="text-align:center; color:#475569; margin-top: 20px;"><small>v3.2 - Stable Sync</small></div>

<script>
    let peer, conn, connections = [], isHost = false;
    let fullDictionary = [];
    let players = {}; 
    let currentRound = { baseWord: "", scrambled: [], solutions: [], found: [], timeLeft: 30, active: false };
    let timerInterval, autoShuffleInterval;

    const normalize = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
    const joinId = new URLSearchParams(window.location.search).get('join')?.trim();

    async function loadDict() {
        try {
            // REMPLACE PAR TES INFOS GITHUB
            const url = 'https://raw.githubusercontent.com/TON_PSEUDO/TON_DEPOT/main/lexique.txt';
            const resp = await fetch(url);
            const text = await resp.text();
            fullDictionary = text.split(/\r?\n/).map(line => normalize(line.split('\t')[0].trim())).filter(w => w.length >= 4 && w.length <= 8);
            setupUIReady();
        } catch (e) {
            fullDictionary = ["MAISON", "BATEAU", "AVION", "SOLEIL", "VOITURE"].map(normalize);
            setupUIReady(true);
        }
    }

    function setupUIReady(err) {
        document.getElementById('status-msg').innerText = err ? "⚠️ Mode secours" : "✅ Dico prêt";
        document.getElementById(joinId ? 'join-btn' : 'host-btn').style.display = "inline-block";
    }

    function hostGame() {
        isHost = true;
        peer = new Peer();
        peer.on('open', (id) => {
            players[id] = { pseudo: document.getElementById('player-pseudo').value || "Host", scorePartie: 0, scoreSession: 0 };
            document.getElementById('game-link-input').value = window.location.href.split('?')[0] + "?join=" + id;
            document.getElementById('share-area').style.display = "block";
            updateScoreBoard();
        });
        peer.on('connection', (c) => {
            connections.push(c);
            c.on('data', (data) => {
                if (data.type === 'JOIN') { 
                    players[c.peer] = { pseudo: data.pseudo, scorePartie: 0, scoreSession: 0 };
                    broadcast({ type: 'SYNC', round: currentRound, players: players });
                }
                if (data.type === 'GUESS') handleGuess(data.word, c.peer);
                if (data.type === 'REQ_SHUFFLE') shuffleAndBroadcast();
            });
        });
    }

    function joinGame() {
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(joinId);
            conn.on('open', () => conn.send({ type: 'JOIN', pseudo: document.getElementById('player-pseudo').value || "Joueur" }));
            conn.on('data', handleIncomingData);
        });
    }

    function setupNewRound() {
        if (!isHost) return;
        const base = fullDictionary[Math.floor(Math.random() * fullDictionary.length)];
        const f = {}; for(let l of base) f[l] = (f[l]||0)+1;
        const possible = fullDictionary.filter(w => {
            const wf = {}; for(let l of w) wf[l] = (wf[l]||0)+1;
            for(let l in wf) if(!f[l] || wf[l]>f[l]) return false;
            return true;
        });

        for(let id in players) players[id].scorePartie = 0;
        currentRound = { 
            baseWord: base, 
            scrambled: base.split('').sort(() => Math.random() - 0.5),
            solutions: possible, found: [], timeLeft: 45, active: true 
        };
        broadcast({ type: 'START', round: currentRound, players: players });
        
        if (autoShuffleInterval) clearInterval(autoShuffleInterval);
        autoShuffleInterval = setInterval(shuffleAndBroadcast, 20000);
    }

    function shuffleAndBroadcast() {
        if (!isHost || !currentRound.active) return;
        currentRound.scrambled.sort(() => Math.random() - 0.5);
        broadcast({ type: 'SHUFFLE', scrambled: currentRound.scrambled });
    }

    function requestShuffle() {
        if (isHost) shuffleAndBroadcast();
        else if (conn) conn.send({ type: 'REQ_SHUFFLE' });
    }

    function handleGuess(word, pid) {
        const val = normalize(word);
        if (currentRound.active && currentRound.solutions.includes(val) && !currentRound.found.includes(val)) {
            currentRound.found.push(val);
            const pts = val.length;
            players[pid].scorePartie += pts;
            players[pid].scoreSession += pts;
            currentRound.timeLeft = Math.min(180, currentRound.timeLeft + pts);
            broadcast({ type: 'UPDATE', word: val, newTime: currentRound.timeLeft, players: players, finder: players[pid].pseudo, pts: pts });
        }
    }

    function handleIncomingData(data) {
        if (data.type === 'START' || data.type === 'SYNC') {
            currentRound = data.round;
            players = data.players;
            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('game-layout').style.display = 'flex';
            document.getElementById('end-overlay').style.display = 'none';
            document.getElementById('user-input').disabled = false;
            renderUI();
            startVisualTimer();
        }
        if (data.type === 'SHUFFLE') {
            currentRound.scrambled = data.scrambled;
            updateDisplayLetters();
        }
        if (data.type === 'UPDATE') {
            currentRound.found.push(data.word);
            currentRound.timeLeft = data.newTime;
            players = data.players;
            const slot = document.getElementById('word-' + data.word);
            if (slot) { slot.innerText = data.word; slot.className = 'word-slot revealed'; }
            addToFeed(data.finder, data.word, data.pts);
            updateScoreBoard();
        }
        if (data.type === 'END') {
            currentRound.active = false;
            document.getElementById('user-input').disabled = true;
            document.getElementById('end-overlay').style.display = 'block';
            document.getElementById(isHost ? 'replay-btn' : 'wait-host-msg').style.display = 'block';
        }
    }

    function renderUI() {
        updateScoreBoard();
        const container = document.getElementById('main-container');
        container.innerHTML = "";
        const groups = {};
        currentRound.solutions.forEach(w => { (groups[w.length] = groups[w.length] || []).push(w); });
        Object.keys(groups).sort((a,b) => a-b).forEach(len => {
            let html = `<div class="length-section"><div class="length-title">${len} LETTRES</div><div class="word-grid">`;
            groups[len].forEach(w => {
                const found = currentRound.found.includes(w);
                html += `<div class="word-slot ${found?'revealed':''}" id="word-${w}">${found ? w : "_ ".repeat(w.length)}</div>`;
            });
            container.innerHTML += html + `</div></div>`;
        });
        updateDisplayLetters();
    }

    function updateDisplayLetters() {
        const display = document.getElementById('scrambled-display');
        // Sécurité : si scrambled est vide, on prend le mot de base
        const letters = (currentRound.scrambled && currentRound.scrambled.length > 0) 
                        ? currentRound.scrambled 
                        : currentRound.baseWord.split('');
        display.innerText = letters.join(' ');
    }

    function startVisualTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!currentRound.active) return;
            if (isHost) {
                currentRound.timeLeft--;
                if (currentRound.timeLeft <= 0) broadcast({ type: 'END' });
            } else {
                currentRound.timeLeft--;
            }
            const t = Math.max(0, currentRound.timeLeft);
            document.getElementById('timer-text').innerText = `0${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
            document.getElementById('timer-bar').style.width = (t/180*100) + "%";
        }, 1000);
    }

    function updateScoreBoard() {
        document.getElementById('score-board').innerHTML = Object.values(players).sort((a,b) => b.scorePartie - a.scorePartie)
            .map(p => `<div><span>${p.pseudo}</span><span><b>${p.scorePartie}</b> <small>(${p.scoreSession})</small></span></div>`).join('');
        if (!currentRound.active) document.getElementById('lobby-display').innerText = "Joueurs : " + Object.values(players).map(p=>p.pseudo).join(', ');
    }

    function addToFeed(ps, w, pt) {
        const f = document.getElementById('feed');
        f.innerHTML += `<div class="feed-item"><b>${ps}</b> : ${w} (+${pt})</div>`;
    }

    function broadcast(d) { connections.forEach(c => c.send(d)); handleIncomingData(d); }
    function copyLink() { navigator.clipboard.writeText(document.getElementById('game-link-input').value); alert("Lien copié !"); }

    document.getElementById('user-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.target.value.trim()) {
            if (isHost) handleGuess(e.target.value, peer.id);
            else if (conn) conn.send({ type: 'GUESS', word: e.target.value });
            e.target.value = "";
        }
    });

    loadDict();
</script>
</body>
</html>
