<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anagrammes Master - Multi Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --missed: #fbbf24; --success: #22c55e; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #f8fafc; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding-bottom: 140px; 
        }

        /* Header & Chrono */
        .game-header { 
            background: var(--card); width: 100%; padding: 10px 0; text-align: center; 
            position: sticky; top: 0; z-index: 10; box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }
        .timer-container { width: 100%; height: 6px; background: #334155; margin-top: 10px; overflow: hidden; }
        #timer-bar { height: 100%; width: 100%; background: var(--primary); transition: width 1s linear; }

        .container { width: 95%; max-width: 900px; padding: 20px; text-align: center; }
        
        /* Setup / Connexion */
        .connection-box { background: var(--card); padding: 2rem; border-radius: 1.5rem; border: 2px dashed var(--primary); margin-top: 20px; }
        .copy-group { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .copy-group input { 
            background: #0f172a; border: 1px solid #475569; color: var(--primary); 
            padding: 10px; border-radius: 6px; width: 60%; font-size: 0.9rem; 
        }

        /* Jeu */
        .letters { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: var(--primary); letter-spacing: 0.5rem; margin: 15px 0; text-transform: uppercase; text-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        #user-input { 
            background: #1e293b; border: 2px solid #475569; color: white; padding: 12px; 
            font-size: 1.8rem; border-radius: 0.8rem; width: 80%; max-width: 400px; 
            outline: none; text-align: center; 
        }
        #user-input:focus { border-color: var(--primary); }
        #user-input:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Grilles et Sections */
        .length-section { margin-top: 30px; text-align: left; }
        .length-title { font-size: 0.9rem; font-weight: bold; color: #64748b; border-bottom: 1px solid #334155; padding-bottom: 5px; margin-bottom: 12px; }
        .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .word-slot { 
            background: #0f172a; padding: 10px; border-radius: 6px; border: 1px solid #334155;
            font-family: 'Courier New', monospace; font-size: 1.1rem; text-align: center;
            white-space: nowrap; color: transparent; transition: all 0.3s;
        }
        
        .
