<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anagrammes Master Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --danger: #f43f5e; --success: #10b981; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; display: flex; flex-direction: column; align-items: center; }
        
        /* Header & Timer */
        .game-header { background: var(--card); width: 100%; padding: 10px 0; text-align: center; position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .timer-container { width: 100%; height: 6px; background: #334155; margin-top: 10px; }
        #timer-bar { height: 100%; width: 100%; background: var(--primary); transition: width 0.5s linear; }

        /* Layout */
        .container { width: 95%; max-width: 1100px; padding: 20px; }
        .game-layout { display: flex; gap: 20px; flex-wrap: wrap; }
        .main-game { flex: 2; min-width: 300px; text-align: center; }
        .side-panel { flex: 1; min-width: 250px; background: var(--card); border-radius: 15px; padding: 15px; height: fit-content; border-left: 4px solid var(--primary); }

        /* Connexion UI */
        .connection-box { background: var(--card); padding: 2rem; border-radius: 1.5rem; border: 2px dashed var(--primary); text-align: center; }
        input[type="text"] { background: #0f172a; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }

        /* Jeu */
        .letters-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0; }
        .letters { font-size: clamp(2rem, 6vw, 4rem); font-weight: 900; color: var(--primary); letter-spacing: 0.4rem; text-transform: uppercase; }
        #user-input { width: 80%; max-width: 400px; font-size: 1.5rem; text-align: center; margin-bottom: 20px; }
        
        /* Grille de mots */
        .length-section { margin-top: 20px; text-align: left; }
        .length-title { font-size: 0.8rem; color: #64748b; border-bottom: 1px solid #334155; margin-bottom: 10px; }
        .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
        .word-slot { background: #0f172a; padding: 6px; border-radius: 4px; border: 1px solid #334155; text-align: center; font-family: monospace; color: transparent; }
        .revealed { background: #0c4a6e; color: var(--primary) !important; border-color: var(--primary); }
        .missed { background: #451a03; color: #fbbf24 !important; }

        /* Sidebar elements */
        #score-board div { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #334155; }
        #feed { height: 200px; overflow-y: auto; font-size: 0.85rem; color: #94a3b8; display: flex; flex-direction: column-reverse; }
        .feed-item { margin-bottom: 4px; border-left: 2px solid var(--success); padding-left: 5px; }

        button.btn-success { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-shuffle { background: #334155; border: none; color: white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
    </style>
</head>
<body>

<div class="game-header">
    <div id="timer-text" style="font-family: monospace; font-size: 1.8rem;">00:30</div>
    <div class="timer-container"><div id="timer-bar"></div></div>
</div>

<div class="container">
    <div id="setup-ui" class="connection-box">
        <h2 id="status-msg">Chargement du dictionnaire...</h2>
        <div id="pseudo-area" style="margin-bottom: 20px;">
            <input type="text" id="player-pseudo" placeholder="Entre ton pseudo..." maxlength="15">
        </div>
        <div id="share-area" style="display:none">
            <p>Partage ce lien pour jouer :</p>
            <input type="text" id="game-link-input" readonly style="width: 70%;">
            <button class="btn-success" onclick="copyLink()">📋</button>
            <br><br>
            <button id="start-btn" class="btn-success" style="display:none" onclick="setupNewRound()">🚀 LANCER LA PARTIE</button>
        </div>
    </div>

    <div id="game-layout" class="game-layout" style="display:none">
        <div class="main-game">
            <div class="letters-row">
                <div class="letters" id="scrambled-display">-------</div>
                <button class="btn-shuffle" onclick="shuffleVisual()">🔄</button>
            </div>
            <div id="mystery-badge" style="color: var(--danger); font-weight: bold; margin-bottom: 10px;"></div>
            <input type="text" id="user-input" placeholder="Tape un mot..." autocomplete="off">
            <div id="main-container"></div>
        </div>

        <div class="side-panel">
            <h3 style="margin:0 0 10px 0; color:var(--primary); font-size:1.1rem;">CLASSEMENT</h3>
            <div id="score-board"></div>
            
            <h3 style="margin:20px 0 10px 0; color:#64748b; font-size:0.9rem;">ACTIVITÉ</h3>
            <div id="feed"></div>
        </div>
    </div>
</div>

<script>
    let peer, conn, connections = [], isHost = false;
    let fullDictionary = [];
    let myPseudo = "Pikoo";
    let players = {}; // { peerId: { pseudo, scorePartie, scoreSession } }
    let currentRound = { baseWord: "", solutions: [], found: [], timeLeft: 30, active: false, mystery: null };
    let timerInterval;

    const normalize = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('join');

    // --- CHARGEMENT DICO PERSO ---
    async function loadDict() {
        try {
            // REMPLACE PAR TON LIEN RAW REEL
            const url = 'https://raw.githubusercontent.com/pikoopik88/anagrammesfr/refs/heads/main/lexique.txt';
            const resp = await fetch(url);
            if (!resp.ok) throw new Error();
            const text = await resp.text();
            fullDictionary = Array.from(new Set(text.split(/\r?\n/).map(line => normalize(line.split('\t')[0].trim())).filter(w => w.length >= 4 && w.length <= 8)));
            document.getElementById('status-msg').innerHTML = `✅ Dico prêt (${fullDictionary.length} mots)`;
        } catch (e) {
            document.getElementById('status-msg').innerHTML = "⚠️ Erreur dico. Mode secours.";
            fullDictionary = ["MAISON", "MANGER", "BATEAU", "AVION", "PLAGE", "SOLEIL"].map(normalize);
        }
    }

    // --- INITIALISATION ---
    async function init() {
        await loadDict();
        peer = new Peer({ config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] } });

        peer.on('open', (id) => {
            if (joinId) {
                conn = peer.connect(joinId, { reliable: true });
                setupClientEvents(conn);
            } else {
                isHost = true;
                const link = window.location.href.split('?')[0] + "?join=" + id;
                document.getElementById('game-link-input').value = link;
                document.getElementById('share-area').style.display = "block";
                document.getElementById('start-btn').style.display = "inline-block";
                // L'hôte est son propre premier joueur
                players[id] = { pseudo: "Host", scorePartie: 0, scoreSession: 0 };
            }
        });

        if (isHost) {
            peer.on('connection', (c) => {
                connections.push(c);
                c.on('open', () => {
                    c.send({ type: 'ASK_PSEUDO' });
                    if (currentRound.active) {
                        c.send({ type: 'SYNC', round: currentRound, serverTime: currentRound.timeLeft, players: players });
                    }
                });
                c.on('data', (data) => {
                    if (data.type === 'JOIN') {
                        players[c.peer] = { pseudo: data.pseudo, scorePartie: 0, scoreSession: 0 };
                        broadcast({ type: 'SCORE_UPDATE', players: players });
                    }
                    if (data.type === 'GUESS') handleGuess(data.word, c.peer);
                });
            });
        }
    }

    function setupClientEvents(c) {
        c.on('data', (data) => handleIncomingData(data));
        c.on('open', () => {
            document.getElementById('status-msg').innerText = "Connecté ! Attente du Host...";
        });
    }

    // --- LOGIQUE DE JEU ---
    function setupNewRound() {
        if (!isHost) return;
        const base = fullDictionary[Math.floor(Math.random() * fullDictionary.length)];
        const f = {}; for(let l of base) f[l] = (f[l]||0)+1;
        const possible = fullDictionary.filter(w => {
            const wf = {}; for(let l of w) wf[l] = (wf[l]||0)+1;
            for(let l in wf) if(!f[l] || wf[l]>f[l]) return false;
            return true;
        }).sort((a,b) => a.length - b.length);

        // Reset scores partie
        for(let id in players) players[id].scorePartie = 0;

        currentRound = { 
            baseWord: base, 
            solutions: possible, 
            found: [], 
            timeLeft: 30, 
            active: true,
            mystery: possible.length < 12 ? { active: true, letter: base[0], index: 0 } : null 
        };

        broadcast({ type: 'START', round: currentRound, players: players });
    }

    function handleGuess(word, senderId) {
        const val = normalize(word);
        if (currentRound.active && currentRound.solutions.includes(val) && !currentRound.found.includes(val)) {
            currentRound.found.push(val);
            const pts = val.length;
            if (players[senderId]) {
                players[senderId].scorePartie += pts;
                players[senderId].scoreSession += pts;
            }
            currentRound.timeLeft = Math.min(180, currentRound.timeLeft + pts);
            broadcast({ 
                type: 'UPDATE', 
                word: val, 
                newTime: currentRound.timeLeft, 
                players: players, 
                finder: players[senderId]?.pseudo || "Inconnu" 
            });
        }
    }

    function handleIncomingData(data) {
        if (data.type === 'ASK_PSEUDO') {
            myPseudo = document.getElementById('player-pseudo').value.trim() || "Anonyme";
            conn.send({ type: 'JOIN', pseudo: myPseudo });
        }
        if (data.type === 'START' || data.type === 'SYNC') {
            currentRound = data.round;
            players = data.players || players;
            if (data.serverTime) currentRound.timeLeft = data.serverTime;
            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('game-layout').style.display = 'flex';
            renderUI();
            startVisualTimer();
        }
        if (data.type === 'UPDATE') {
            if(!currentRound.found.includes(data.word)) currentRound.found.push(data.word);
            currentRound.timeLeft = data.newTime;
            players = data.players;
            revealWord(data.word, 'revealed');
            addToFeed(data.finder, data.word, data.word.length);
            updateScoreBoard();
        }
        if (data.type === 'SCORE_UPDATE') {
            players = data.players;
            updateScoreBoard();
        }
        if (data.type === 'END') {
            currentRound.active = false;
            data.allSolutions.forEach(w => revealWord(w, currentRound.found.includes(w) ? 'revealed' : 'missed'));
        }
    }

    // --- UI FUNCTIONS ---
    function renderUI() {
        updateScoreBoard();
        document.getElementById('feed').innerHTML = "";
        const container = document.getElementById('main-container');
        container.innerHTML = "";
        const groups = {};
        currentRound.solutions.forEach(w => { (groups[w.length] = groups[w.length] || []).push(w); });
        Object.keys(groups).forEach(len => {
            let html = `<div class="length-section"><div class="length-title">${len} LETTRES</div><div class="word-grid">`;
            groups[len].forEach(w => {
                const isFound = currentRound.found.includes(w);
                html += `<div class="word-slot ${isFound?'revealed':''}" id="word-${w}">${isFound ? w : "_ ".repeat(w.length)}</div>`;
            });
            container.innerHTML += html + `</div></div>`;
        });
        updateDisplayLetters();
    }

    function updateScoreBoard() {
        const board = document.getElementById('score-board');
        board.innerHTML = Object.values(players).sort((a,b) => b.scorePartie - a.scorePartie)
            .map(p => `<div><span>${p.pseudo}</span><span><b>${p.scorePartie}</b> <small>(${p.scoreSession})</small></span></div>`).join('');
    }

    function addToFeed(pseudo, word, pts) {
        const f = document.getElementById('feed');
        f.innerHTML += `<div class="feed-item"><b>${pseudo}</b>: ${word} (+${pts})</div>`;
    }

    function updateDisplayLetters() {
        let l = currentRound.baseWord.split('');
        if (currentRound.mystery && !currentRound.found.some(w => w.includes(currentRound.mystery.letter))) {
            l[currentRound.mystery.index] = "?";
            document.getElementById('mystery-badge').innerText = "⚠️ LETTRE MYSTÈRE À TROUVER";
        } else {
            document.getElementById('mystery-badge').innerText = "";
        }
        document.getElementById('scrambled-display').innerText = l.sort(() => Math.random() - 0.5).join(' ');
    }

    function startVisualTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!currentRound.active) return;
            if (isHost) {
                currentRound.timeLeft--;
                if (currentRound.timeLeft <= 0) {
                    currentRound.timeLeft = 0;
                    broadcast({ type: 'END', allSolutions: currentRound.solutions });
                }
            } else {
                currentRound.timeLeft--;
            }
            const t = Math.max(0, currentRound.timeLeft);
            document.getElementById('timer-text').innerText = `0${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
            document.getElementById('timer-bar').style.width = (t/180*100) + "%";
        }, 1000);
    }

    function revealWord(w, cls) {
        const el = document.getElementById('word-' + w);
        if (el) { el.innerText = w; el.className = 'word-slot ' + cls; }
        updateDisplayLetters();
    }

    function broadcast(d) { connections.forEach(c => c.open && c.send(d)); handleIncomingData(d); }
    function shuffleVisual() { 
        const txt = document.getElementById('scrambled-display').innerText.replace(/\s/g, '').split('');
        document.getElementById('scrambled-display').innerText = txt.sort(() => Math.random() - 0.5).join(' ');
    }
    function copyLink() { navigator.clipboard.writeText(document.getElementById('game-link-input').value); }

    document.getElementById('user-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = e.target.value.trim();
            if (isHost) handleGuess(val, peer.id); else if (conn) conn.send({ type: 'GUESS', word: val });
            e.target.value = "";
        }
    });

    init();
</script>
</body>
</html>
